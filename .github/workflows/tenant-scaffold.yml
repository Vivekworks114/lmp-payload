name: Tenant scaffold

# Scaffolds a new tenant's Astro app folder (apps/sites/<slug>) by running
# `pnpm tenant-cli create` in CI, then opens a PR for review.
#
# Triggered by the "Scaffold Tenant Code" button in the Payload admin, which
# POSTs to /api/tenants/:id/scaffold and dispatches this workflow.
#
# The tenant ROW must already exist in Payload (the button is only enabled on
# saved tenants). This workflow only generates the code-side artefacts.
on:
  workflow_dispatch:
    inputs:
      tenant_slug:
        description: 'Tenant slug (lowercase, hyphens) — must already exist as a Payload row'
        required: true
        type: string
      tenant_domain:
        description: 'Tenant primary domain, no protocol (e.g. kookhulpjes.nl)'
        required: true
        type: string
      tenant_name:
        description: 'Display name (e.g. Kookhulpjes)'
        required: true
        type: string
      template:
        description: 'Path to the template tenant (defaults to apps/sites/keukenfaqs)'
        required: false
        type: string
        default: 'apps/sites/keukenfaqs'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: tenant-scaffold-${{ github.event.inputs.tenant_slug }}
  cancel-in-progress: false

jobs:
  scaffold:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TENANT_SLUG: ${{ github.event.inputs.tenant_slug }}
      TENANT_DOMAIN: ${{ github.event.inputs.tenant_domain }}
      TENANT_NAME: ${{ github.event.inputs.tenant_name }}
      TEMPLATE: ${{ github.event.inputs.template }}
    steps:
      - name: Validate slug
        run: |
          if ! echo "$TENANT_SLUG" | grep -Eq '^[a-z][a-z0-9-]*$'; then
            echo "::error ::Invalid slug '$TENANT_SLUG' — must be lowercase letters, digits, hyphens, starting with a letter."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can push a new branch.
          fetch-depth: 0

      - name: Fail fast if folder already exists
        run: |
          if [ -d "apps/sites/${TENANT_SLUG}" ]; then
            echo "::error ::apps/sites/${TENANT_SLUG} already exists on main. Nothing to scaffold."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Run tenant-cli create
        run: |
          pnpm tenant-cli create \
            --slug "$TENANT_SLUG" \
            --domain "$TENANT_DOMAIN" \
            --name "$TENANT_NAME" \
            --template "$TEMPLATE" \
            --skip-payload-create

      - name: Configure git
        run: |
          git config user.name "astropayload-bot"
          git config user.email "bot@astropayload.local"

      - name: Create branch + commit
        id: commit
        run: |
          BRANCH="scaffold/${TENANT_SLUG}"
          git checkout -b "$BRANCH"
          git add apps/sites/${TENANT_SLUG}
          git commit -m "feat(tenants): scaffold ${TENANT_SLUG} (${TENANT_DOMAIN})

Generated by .github/workflows/tenant-scaffold.yml.

Tenant row already exists in Payload. This PR only adds the per-tenant
Astro app folder so CI can build + deploy it. Review and merge to bring
the new site online."
          git push --set-upstream origin "$BRANCH" --force
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If a PR for this branch already exists, just print its URL.
          existing=$(gh pr list --head "${{ steps.commit.outputs.branch }}" --json url --jq '.[0].url' || true)
          if [ -n "$existing" ]; then
            echo "PR already open: $existing"
            echo "::notice ::Existing PR: $existing"
            exit 0
          fi
          gh pr create \
            --title "Scaffold tenant: ${TENANT_SLUG}" \
            --body "Auto-generated scaffold for new tenant **${TENANT_NAME}** (\`${TENANT_SLUG}\`, ${TENANT_DOMAIN}).

What's in this PR:
- \`apps/sites/${TENANT_SLUG}/\` — copy of the keukenfaqs template, minus content folders.
- Renamed package name, Wrangler project, and \`tenant.config.json\`.

Next steps after merge:
1. Click **Deploy** on the tenant row in the Payload admin (or run \`gh workflow run tenant-deploy.yml -f tenant_slug=${TENANT_SLUG}\`).
2. In the Cloudflare dashboard, attach \`${TENANT_DOMAIN}\` as a custom domain on the new Worker.

Review the diff to confirm nothing template-specific leaked in." \
            --head "${{ steps.commit.outputs.branch }}" \
            --base main
