name: Tenant deploy

# Triggered by the Payload -> webhook receiver after a content change.
# Builds and deploys ONLY the tenant whose slug is passed in.
on:
  workflow_dispatch:
    inputs:
      tenant_slug:
        description: 'Tenant slug (matches apps/sites/<slug>)'
        required: true
        type: string
      reason:
        description: 'What triggered the deploy (collection + id)'
        required: false
        type: string

concurrency:
  # Coalesce multiple webhook fires for the same tenant — only the latest run
  # finishes, the rest are cancelled. Saves CI minutes when an editor saves
  # many docs in a burst.
  group: tenant-deploy-${{ github.event.inputs.tenant_slug }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TENANT: ${{ github.event.inputs.tenant_slug }}
      PAYLOAD_URL: ${{ secrets.PAYLOAD_URL }}
      PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Resolve tenant path
        id: tenant
        run: |
          if [ ! -d "apps/sites/${TENANT}" ]; then
            echo "::error ::No tenant folder at apps/sites/${TENANT}"
            exit 1
          fi
          echo "filter=@astropayload/site-${TENANT}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync content from Payload
        run: pnpm --filter ${{ steps.tenant.outputs.filter }} sync:content

      - name: Build
        run: pnpm --filter ${{ steps.tenant.outputs.filter }} build

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter ${{ steps.tenant.outputs.filter }} deploy
