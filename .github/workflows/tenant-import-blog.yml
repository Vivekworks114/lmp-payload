name: Tenant import blog from repo

on:
  workflow_dispatch:
    inputs:
      tenant_slug:
        required: true
        type: string
      github_repo:
        required: true
        type: string
      github_branch:
        required: false
        type: string
        default: main
      blog_content_path:
        required: false
        type: string
        default: src/content/blog

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TENANT: ${{ github.event.inputs.tenant_slug }}
      GITHUB_REPO: ${{ github.event.inputs.github_repo }}
      GITHUB_BRANCH: ${{ github.event.inputs.github_branch || 'main' }}
      BLOG_PATH: ${{ github.event.inputs.blog_content_path || 'src/content/blog' }}
      PAYLOAD_URL: ${{ secrets.PAYLOAD_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
    steps:
      - name: Checkout platform
        uses: actions/checkout@v4
        with:
          path: platform

      - name: Checkout client repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITHUB_REPO }}
          ref: ${{ env.GITHUB_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: site

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install and import
        working-directory: platform
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @astropayload/payload import:blog-from-repo -- \
            --slug "$TENANT" \
            --site "${{ github.workspace }}/site" \
            --blog-path "$BLOG_PATH"
